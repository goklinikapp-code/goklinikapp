name: goklinik_mobile
description: GoKlinik patient app for iOS and Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.2.3
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  intl: ^0.19.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  local_auth: ^2.3.0
  url_launcher: ^6.3.1
  app_links: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  path_provider_foundation: 2.4.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/fonts/

flutter_native_splash:
  color: '#F0F4F6'
  image: assets/images/logo_go_klink.png
  android_12:
    color: '#F0F4F6'
    image: assets/images/logo_go_klink.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_app_go_klink.png
  image_path_ios: assets/images/logo_app_go_klink.png
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_foreground: assets/images/logo_app_go_klink.png
  adaptive_icon_background: '#F0F4F6'
