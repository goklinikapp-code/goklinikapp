name: goklinik_medic
description: GoKlinik Medic app for doctors and nurses.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  flutter_local_notifications: ^17.2.3
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.10+1
  local_auth: ^2.3.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  path_provider_foundation: 2.4.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/goklinik_app_medic.png
  min_sdk_android: 21
  remove_alpha_ios: true
